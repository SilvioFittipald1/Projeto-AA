# Sobe o servidor (broker MQTT) + o dashboard com um unico comando.
# Multiplataforma (Docker Desktop em Windows/macOS):  docker compose up -d
services:
  mosquitto:
    image: eclipse-mosquitto:2
    container_name: mosquitto
    ports:
      - "1883:1883"
    volumes:
      - ./broker/mosquitto.conf:/mosquitto/config/mosquitto.conf:ro

  nodered:
    build: ./dashboard          # imagem oficial + node-red-dashboard (vide Dockerfile)
    container_name: nodered
    ports:
      - "1880:1880"
    volumes:
      - nodered_data:/data
      - ./dashboard/flows.json:/data/flows.json
    depends_on:
      - mosquitto

volumes:
  nodered_data:
